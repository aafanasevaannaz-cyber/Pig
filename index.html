<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐷 Свинка-Дружок | Антистресс Тамагочи</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/animations.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>🐷 Свинка-Дружок</h1>
      <p class="subtitle">Твой антистресс-компаньон</p>
      <div class="header-controls">
        <button id="soundToggle" class="sound-btn" title="Включить/выключить звук">🔊</button>
        <button id="resetBtn" class="reset-btn" title="Сбросить игру">↻</button>
      </div>
    </header>

    <main class="app-main">
      <div class="pet-scene">
        <div class="pet-container">
          <div class="pet" id="pet">
            <div class="pig-body">
              <div class="pig-head">
                <div class="pig-ear left"></div>
                <div class="pig-ear right"></div>
                <div class="pig-snout">
                  <div class="nostril"></div>
                  <div class="nostril"></div>
                </div>
                <div class="pig-eyes">
                  <div class="pig-eye left"></div>
                  <div class="pig-eye right"></div>
                </div>
                <div class="pig-mouth"></div>
              </div>
              <div class="pig-body-main"></div>
              <div class="pig-legs">
                <div class="pig-leg"></div>
                <div class="pig-leg"></div>
                <div class="pig-leg"></div>
                <div class="pig-leg"></div>
              </div>
              <div class="pig-tail"></div>
            </div>
          </div>
          <div class="pet-status">
            <p class="status-text" id="statusText">Свинка проснулась...</p>
            <div class="emotion" id="emotion">🐷</div>
          </div>
        </div>

        <div class="stats-panel">
          <div class="stat">
            <div class="stat-header">
              <label>🍎 Голод</label>
              <span id="hungerValue">30%</span>
            </div>
            <div class="stat-bar">
              <div class="stat-fill hunger-fill" id="hungerBar"></div>
            </div>
          </div>
          <div class="stat">
            <div class="stat-header">
              <label>💕 Счастье</label>
              <span id="happinessValue">70%</span>
            </div>
            <div class="stat-bar">
              <div class="stat-fill happiness-fill" id="happinessBar"></div>
            </div>
          </div>
          <div class="stat">
            <div class="stat-header">
              <label>⚡ Энергия</label>
              <span id="energyValue">80%</span>
            </div>
            <div class="stat-bar">
              <div class="stat-fill energy-fill" id="energyBar"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="feedBtn">
          🍎 Покормить
        </button>
        <button class="btn btn-primary" id="petBtn">
          🎀 Погладить
        </button>
        <button class="btn btn-primary" id="playBtn">
          🎾 Поиграть
        </button>
        <button class="btn btn-secondary" id="sleepBtn">
          😴 Спать
        </button>
      </div>

      <div class="info-panel">
        <div class="info-item">
          <span class="label">Настроение:</span>
          <span id="moodText" class="value">😌</span>
        </div>
        <div class="info-item">
          <span class="label">Время:</span>
          <span id="timeText" class="value">--:--</span>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <p>Сделано с любовью 💚 | Версия 1.0</p>
    </footer>
  </div>

  <!-- Аудио контекст -->
  <script src="js/sound-manager.js"></script>
  <script src="js/pet-logic.js"></script>
  <script src="js/ui-manager.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
