<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Свинка-антистресс</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/animations.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>🐷 Свинка-дружок</h1>
      <p class="subtitle">Твой антистресс-пета</p>
    </header>

    <main class="app-main">
      <div class="pet-scene">
        <div class="pet-container">
          <div class="pet" id="pet">
            <div class="pig-body">
              <div class="pig-head">
                <div class="pig-ear"></div>
                <div class="pig-ear"></div>
                <div class="pig-snout">
                  <div class="nostril"></div>
                  <div class="nostril"></div>
                </div>
                <div class="pig-eye"></div>
                <div class="pig-eye"></div>
              </div>
              <div class="pig-legs">
                <div class="pig-leg"></div>
                <div class="pig-leg"></div>
                <div class="pig-leg"></div>
                <div class="pig-leg"></div>
              </div>
              <div class="pig-tail"></div>
            </div>
          </div>
          <div class="pet-status">
            <p class="status-text" id="statusText">Свинка спит...</p>
            <div class="emotion" id="emotion">😴</div>
          </div>
        </div>

        <div class="stats-panel">
          <div class="stat">
            <label>Голод</label>
            <div class="stat-bar">
              <div class="stat-fill hunger-fill" id="hungerBar"></div>
            </div>
            <span id="hungerValue">80%</span>
          </div>
          <div class="stat">
            <label>Счастье</label>
            <div class="stat-bar">
              <div class="stat-fill happiness-fill" id="happinessBar"></div>
            </div>
            <span id="happinessValue">70%</span>
          </div>
          <div class="stat">
            <label>Энергия</label>
            <div class="stat-bar">
              <div class="stat-fill energy-fill" id="energyBar"></div>
            </div>
            <span id="energyValue">60%</span>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="feedBtn">
          🍎 Покормить
        </button>
        <button class="btn btn-primary" id="playBtn">
          🎾 Поиграть
        </button>
        <button class="btn btn-primary" id="petBtn">
          🎀 Погладить
        </button>
        <button class="btn btn-secondary" id="sleepBtn">
          😴 Спать
        </button>
      </div>

      <div class="info-panel">
        <div class="info-item">
          <span class="label">Состояние:</span>
          <span id="moodText" class="value">Спит</span>
        </div>
        <div class="info-item">
          <span class="label">Время:</span>
          <span id="timeText" class="value">00:00</span>
        </div>
      </div>
    </main>
  </div>

  <script src="js/pet-logic.js"></script>
  <script src="js/ui-manager.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
