<!doctype html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cartoon Rig v2</title><style>
body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(#f7efe6,#ebdfd0 52%,#dcc9b6);color:#2f2621} .app{max-width:440px;margin:0 auto;padding:16px}.card{background:rgba(255,255,255,.58);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.64);box-shadow:0 24px 60px rgba(79,58,43,.14);border-radius:28px}.top{padding:14px 16px;display:flex;justify-content:space-between;align-items:center}.pill{background:rgba(255,255,255,.82);padding:10px 14px;border-radius:999px;color:#79665c;font-size:12px}.scene{position:relative;height:540px;overflow:hidden;margin-top:12px;background:linear-gradient(#f8f2eb,#eadfd2 54%,#dcc6b4)} .ground{position:absolute;left:18px;right:18px;bottom:18px;height:124px;border-radius:999px;background:rgba(255,255,255,.24)} .house{position:absolute;left:24px;bottom:36px;width:152px;height:118px;border-radius:40px 40px 24px 24px;background:linear-gradient(#e2ba89,#be8d58);opacity:.14}.house:after{content:'';position:absolute;left:44px;top:46px;width:68px;height:58px;border-radius:30px 30px 22px 22px;background:rgba(94,58,29,.52)} .hay{position:absolute;right:26px;bottom:52px;width:84px;height:46px;border-radius:24px 24px 18px 18px;background:repeating-linear-gradient(100deg,#d1b36a 0 5px,#e2c575 5px 10px,#d8bb71 10px 15px);opacity:.9}.bowl{position:absolute;left:46px;bottom:48px;width:86px;height:40px;border-radius:0 0 32px 32px;background:linear-gradient(#d9e4ce,#a8b98d)} .bowl:before{content:'';position:absolute;left:-2px;right:-2px;top:-10px;height:16px;border-radius:999px;background:linear-gradient(#f7fbf2,#d1dfbf)} .veg{position:absolute;left:74px;bottom:80px;width:26px;height:18px;background:#7fb867;border-radius:16px 16px 2px 16px;transform:rotate(-18deg);box-shadow:12px -2px 0 #95ca7b}.rig{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);width:330px;height:330px}.shadow{position:absolute;left:64px;right:64px;bottom:14px;height:34px;border-radius:999px;background:rgba(78,58,42,.16);filter:blur(10px);animation:shadow 3.4s ease-in-out infinite}.svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 18px 24px rgba(70,52,38,.16))}.root{transform-origin:50% 78%;animation:breathe 3.4s ease-in-out infinite,sway 7s ease-in-out infinite}.head{transform-origin:165px 132px}.earL{transform-origin:122px 90px}.earR{transform-origin:206px 90px}.eyeClosed{opacity:0}.scene.sleep .eyeOpen,.scene.sleep .spark{opacity:0}.scene.sleep .eyeClosed{opacity:1}.rig.pet .head{animation:nuzzle .42s ease-in-out}.rig.pet .earL,.rig.pet .earR{animation:ear .42s ease-in-out}.rig.feed .mouth{animation:chew .55s ease-in-out 2}.rig.play .root{animation:jump .82s ease}.scene.sleep .root{animation:sleep 5.2s ease-in-out infinite}.controls{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.btn{border:0;border-radius:20px;padding:14px 12px;text-align:left;background:rgba(255,255,255,.68);min-height:70px;font:inherit;color:#2f2621}.btn small{display:block;color:#79665c;font-size:11px;margin-top:4px}.btn.on{background:rgba(203,141,105,.22)} .wm{position:fixed;right:16px;bottom:12px;font-size:11px;letter-spacing:.08em;color:rgba(47,39,34,.38)} @keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-2px) scale(1.012)}} @keyframes sway{0%,100%{rotate:-1deg}50%{rotate:1deg}} @keyframes shadow{0%,100%{transform:scaleX(1)}50%{transform:scaleX(1.04)}} @keyframes sleep{0%,100%{transform:translateY(8px) scale(.985)}50%{transform:translateY(4px) scale(.997)}} @keyframes nuzzle{0%,100%{transform:rotate(0) translateX(0)}25%{transform:rotate(-2deg) translateX(-1px)}50%{transform:rotate(2deg) translateX(2px)}75%{transform:rotate(-1deg) translateX(-1px)}} @keyframes ear{0%,100%{transform:rotate(0)}30%{transform:rotate(-9deg)}60%{transform:rotate(4deg)}} @keyframes chew{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.72) translateY(1px)}} @keyframes jump{0%,100%{transform:translateY(0)}35%{transform:translateY(-12px)}60%{transform:translateY(-4px)}}
</style></head><body><div class="app"><div class="card top"><div><strong>Свинка-дружок</strong><div style="font-size:12px;color:#79665c;margin-top:4px">послойный мульт-код</div></div><div class="pill" id="pill">Спокойная и сытая</div></div><div class="card scene" id="scene"><div class="house"></div><div class="hay"></div><div class="bowl"></div><div class="veg"></div><div class="ground"></div><div class="rig" id="rig"><div class="shadow"></div><svg class="svg" viewBox="0 0 330 330"><g class="root"><g><ellipse cx="182" cy="230" rx="106" ry="82" fill="#d98e43"/><ellipse cx="182" cy="238" rx="82" ry="62" fill="#fff8f1"/><ellipse cx="240" cy="217" rx="28" ry="40" fill="#5d3929"/><ellipse cx="116" cy="208" rx="24" ry="34" fill="#4f2d22"/><ellipse cx="248" cy="279" rx="20" ry="9" fill="#3a2922"/><ellipse cx="134" cy="287" rx="18" ry="9" fill="#3a2922"/></g><g class="head"><ellipse cx="166" cy="136" rx="72" ry="56" fill="#d98e43"/><ellipse cx="168" cy="144" rx="48" ry="38" fill="#fffaf3"/><ellipse cx="130" cy="136" rx="22" ry="32" fill="#4a2b23"/><ellipse cx="210" cy="124" rx="20" ry="28" fill="#4c3025"/><g class="earL"><ellipse cx="121" cy="86" rx="16" ry="20" fill="#382823"/><ellipse cx="126" cy="91" rx="9" ry="12" fill="#d9a197"/></g><g class="earR"><ellipse cx="206" cy="88" rx="16" ry="19" fill="#382823"/><ellipse cx="201" cy="92" rx="9" ry="11" fill="#d9a197"/></g><circle class="eyeOpen" cx="154" cy="141" r="10" fill="#261d1a"/><circle class="eyeOpen" cx="193" cy="132" r="9" fill="#261d1a"/><circle class="spark" cx="157" cy="138" r="3" fill="#fff"/><circle class="spark" cx="196" cy="129" r="3" fill="#fff"/><path class="eyeClosed" d="M144 141 Q154 148 164 141" stroke="#3e2e27" stroke-width="4" stroke-linecap="round" fill="none"/><path class="eyeClosed" d="M183 132 Q193 139 203 132" stroke="#3e2e27" stroke-width="4" stroke-linecap="round" fill="none"/><ellipse cx="175" cy="156" rx="13" ry="9" fill="#f0cabd"/><circle cx="170" cy="155" r="1.7" fill="#7a5d54"/><circle cx="180" cy="155" r="1.7" fill="#7a5d54"/><g class="mouth"><path d="M170 163 Q175 168 180 163" stroke="#6b4f46" stroke-width="3" stroke-linecap="round" fill="none"/></g></g><g><ellipse cx="172" cy="214" rx="9" ry="13" fill="#fff9f2"/><ellipse cx="192" cy="210" rx="9" ry="13" fill="#fff9f2"/><ellipse cx="172" cy="218" rx="6" ry="3" fill="#ded4cc"/><ellipse cx="192" cy="214" rx="6" ry="3" fill="#ded4cc"/></g></g></svg></div><button id="touch" class="touch"></button></div><div class="controls" id="controls"><button class="btn on" data-mode="relax">Просто рядом<small>дышит и качается</small></button><button class="btn" data-mode="pet">Гладить<small>голова и ушки двигаются</small></button><button class="btn" data-mode="feed">Покормить<small>работает ротик</small></button><button class="btn" data-mode="sleep">Сон<small>глазки закрыты</small></button><button class="btn" data-mode="house">Домик<small>уходит влево</small></button><button class="btn" data-mode="play">Радость<small>подпрыгивает</small></button></div><div class="wm">@parchaipodusham</div></div><script>
const scene=document.getElementById('scene');const rig=document.getElementById('rig');const pill=document.getElementById('pill');const controls=[...document.querySelectorAll('.btn')];const map={relax:'Спокойная и сытая',pet:'Гладишь — ей хорошо',feed:'Покормили — довольна',sleep:'Сонный режим',house:'Домик и отдых',play:'Милая радость'};function setMode(m){scene.className='card scene '+m;rig.className='rig '+m;pill.textContent=map[m];controls.forEach(b=>b.classList.toggle('on',b.dataset.mode===m));if(m==='pet'||m==='feed'||m==='play'){setTimeout(()=>{if(m!=='sleep'&&m!=='house')setMode('relax')},900)}}controls.forEach(b=>b.onclick=()=>setMode(b.dataset.mode));document.getElementById('touch').onpointerdown=()=>setMode('pet');
</script></body></html>
