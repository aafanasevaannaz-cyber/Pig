<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Свинка-дружок</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f7efe6; }
    iframe { border: 0; width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <iframe id="appFrame" src="./pig-final.html" title="Свинка-дружок"></iframe>
  <script>
    const frame = document.getElementById('appFrame');
    frame.addEventListener('load', () => {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        const watermark = doc.querySelector('.watermark');
        if (watermark) watermark.textContent = '@parchaipodusham';
        doc.title = 'Свинка-дружок';
      } catch (e) {
        console.error(e);
      }
    });
  </script>
</body>
</html>
