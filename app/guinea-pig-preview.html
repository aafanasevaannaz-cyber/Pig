<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Морская свинка-дружок</title><style>
:root {--bg1:#fff7df;--bg2:#f3e8d8;--bg3:#dfcbb4;--card:rgba(255,255,255,.58);--line:rgba(255,255,255,.64);--ink:#302722;--muted:#79665c;--shadow:0 24px 60px rgba(79,58,43,.14)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%}body{margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;color:var(--ink);background:radial-gradient(1200px 760px at 50% -10%,rgba(255,255,255,.62),transparent 60%),linear-gradient(180deg,var(--bg1),var(--bg2) 52%,var(--bg3))}
.app{min-height:100vh;max-width:460px;margin:0 auto;padding:18px 14px calc(92px + env(safe-area-inset-bottom,0px));display:grid;grid-template-rows:auto auto 1fr auto auto;gap:12px}.card{backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:24px}.top{padding:14px 16px;display:flex;justify-content:space-between;gap:10px;align-items:center}h1{margin:0;font-size:20px;line-height:1.05}p{margin:4px 0 0;color:var(--muted);font-size:12px}.pill{border-radius:999px;background:rgba(255,255,255,.82);padding:10px 14px;color:var(--muted);font-size:12px;white-space:nowrap}
.scene{position:relative;min-height:560px;border-radius:34px;overflow:hidden;background:linear-gradient(180deg,#fbf7ee,#f1e7da 48%,#e4d0bb)}.glow{position:absolute;inset:0;background:radial-gradient(340px 200px at 50% 18%,rgba(255,255,255,.55),transparent 70%)}.bubble{position:absolute;top:18px;left:50%;transform:translateX(-50%);padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.86);box-shadow:0 8px 24px rgba(0,0,0,.08);font-size:13px;z-index:7}
.ground{position:absolute;left:22px;right:22px;bottom:16px;height:116px;border-radius:999px;background:rgba(255,248,240,.38)}.house{position:absolute;left:26px;bottom:40px;width:132px;height:96px;border-radius:38px 38px 22px 22px;background:#d4b27a;box-shadow:0 18px 28px rgba(96,64,24,.12);opacity:.16}.house:after{content:'';position:absolute;left:36px;top:36px;width:58px;height:48px;border-radius:26px 26px 20px 20px;background:rgba(94,58,29,.45)}.hay{position:absolute;right:28px;bottom:52px;width:86px;height:42px;border-radius:24px 24px 18px 18px;background:repeating-linear-gradient(100deg,#dfc474 0 5px,#edd58b 5px 10px,#e1c879 10px 15px);opacity:.92}.bowl{position:absolute;left:44px;bottom:48px;width:88px;height:38px;border-radius:0 0 30px 30px;background:linear-gradient(180deg,#cfddc2,#9fb188)}.bowl:before{content:'';position:absolute;left:-2px;right:-2px;top:-10px;height:16px;border-radius:999px;background:linear-gradient(180deg,#f9fcf6,#d7e4c7)}.veg{position:absolute;left:72px;bottom:78px;width:24px;height:16px;background:#7fb867;border-radius:16px 16px 2px 16px;transform:rotate(-18deg);box-shadow:12px -2px 0 #9bd27f}
.pet-wrap{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:min(92%,290px);z-index:6;transition:transform .35s ease,opacity .35s ease,filter .35s ease}.pet-shadow{position:absolute;left:20%;right:20%;bottom:8px;height:24px;border-radius:999px;background:rgba(122,90,49,.14);filter:blur(8px);animation:shadowBreath 3.2s ease-in-out infinite}.pet-body{display:block;width:100%;height:auto;filter:drop-shadow(0 16px 20px rgba(70,52,38,.12));transform-origin:50% 82%;animation:breathe 3.2s ease-in-out infinite,sway 6.2s ease-in-out infinite;position:relative;z-index:1}.pet-wrap.wiggle{animation:petWiggle .34s ease-in-out}.pet-hitbox{position:absolute;inset:18% 18% 5% 18%;border:0;background:transparent;cursor:pointer;z-index:10}.touch-caption{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);font-size:11px;color:rgba(48,39,34,.42);pointer-events:none;z-index:11}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.metric{padding:12px;border-radius:22px}.metric label{display:block;font-size:11px;color:var(--muted)}.metric strong{display:block;margin-top:4px;font-size:14px}.controls{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.ctrl{border:none;border-radius:20px;padding:14px 12px;text-align:left;background:rgba(255,255,255,.68);font:inherit;color:var(--ink);min-height:70px;cursor:pointer}.ctrl small{display:block;margin-top:4px;font-size:11px;color:var(--muted)}.ctrl.active{background:rgba(203,141,105,.22)}.wm{position:fixed;right:16px;bottom:12px;font-size:11px;letter-spacing:.08em;color:rgba(47,39,34,.38);pointer-events:none}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-2px) scale(1.016)}}@keyframes sway{0%,100%{rotate:-1deg}50%{rotate:1deg}}@keyframes petWiggle{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}50%{transform:translateX(3px)}75%{transform:translateX(-2px)}}@keyframes shadowBreath{0%,100%{transform:scaleX(1)}50%{transform:scaleX(1.04)}}@media (max-width:390px){.stats{grid-template-columns:repeat(2,1fr)}.scene{min-height:500px}.pet-wrap{width:min(94%,250px)}}
</style></head><body><div class="app"><div class="card top"><div><h1>Морская свинка-дружок</h1><p>замена розовой свинки на морскую</p></div><div class="pill">Спокойная и сытая</div></div><div class="scene card"><div class="glow"></div><div class="bubble">я рядом</div><div class="house"></div><div class="hay"></div><div class="bowl"></div><div class="veg"></div><div class="ground"></div><div class="pet-wrap" id="petWrap"><div class="pet-shadow"></div><img class="pet-body" alt="Морская свинка" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAF0AAABSCAIAAACqHj/3AAAj5ElEQVR4nN1ae3Mc13V/7r1zC4AAsB2wAi0gQJJsS7IlyZItW7bl2LJlS7Y9u7rM7H4zs9O7e2f2mZ5mZqf3t7Pp1fUvJS1Vt+e9z4oQpESJZEm2LAXYgQ0A2wA2sA0QmBz7v/eKjUo1N1M6g/8/4m9O7vfP7r1z7g0AZM7j7Z2r5dWvX7+6tWvXrl27du3atWvXrl27du3atWvXrl27du3atWvXrl27du3atWvXrl27du3aR3Rz1fQ7u1m8l0c8nH6N9dYv7M9f0J2Vb8q4w1mHjWj1gYf1H8M8o6y0s2k4xk8mW6g9H4e8z+Q6Kf2p0QmYv8r4r9k9j5Q4h3l9+1j2m4cHdz1w3k7k9b0f6w2B9Oq8T7A9J8+9iM3L0vA5t9d7sQ+R1J6nS8G8X4c7H1g6f9+5L1aX5O3m+3Qn2P6T3t8mP1m8M8xV+6nH5c2O4V8UQYb2B8rY9Cw4kC2Dk8j7M3zqg4Yy4w3w8mU1Zc2bQ6nL9vQ7C7e3tP9s8v6l9E6l6v2y2nT4l4H9V4j+R5aVv8Y0m0o9k3m1a2F3p0f5w8X4n3cY3r7p3W0TqX8o5j3f9q7v7m9k5aY4mC5nG3m8fY0p9d5T9mW0y3l+5zZ0VfQ7k8wVJr4mV2Y2h6wL0uC0xWQx9wYkL0c9Wc6b9G9Gv3s8Oa7l3Wv5Q9Tq6M8v4Y0G3XzX0o0X2l5gZz4n3Q+q7eP1d8d+v5WcKkQ9M2mDq9k7i6Sg0yV3cC+0eF7WQ1r1m1wD6r2s0F8aL3W+1eH7V5m9aJr5vPq5nPq3i6m6i7yB+q9c+zK4jv7h8m8d4G8t6X2E5JxU8j6m8m4m9b4c1O8E8e9Jz1Yk6o6X4P5j5Q2C6L6V9R9i4b2m8o5Y6H0m8i9z3j4q9C7p+J6v7mN9b3m+e7k7U3k+2y3zW2dWm7W6l7Y7a7b7c7d7e7f7g7h7i7j7k7l7m7n7o7p7q7r7s7t7u7v7w7x7y7z7z7y7x7w7v7u7t7s7r7q7p7o7n7m7l7k7j7i7h7g7f7e7d7c7b7a7Y7X7W7V7U7T7S7R7Q7P7O7N7M7L7K7J7I7H7G7F7E7D7C7B7A7A7B7C7D7E7F7G7H7I7J7K7L7M7N7O7P7Q7R7S7T7U7V7W7X7Y7Z7a7b7c7d7e7f7g7h7i7j7k7l7m7n7o7p7q7r7s7t7u7v7w7x7y7z7wAAAP//AwCd/7J2b5Q1AAAAAElFTkSuQmCC"><button class="pet-hitbox" id="petHitbox"></button><div class="touch-caption">можно гладить</div></div></div><div class="stats"><div class="card metric"><label>сытость</label><strong>сытая</strong></div><div class="card metric"><label>настроение</label><strong>спокойная</strong></div><div class="card metric"><label>формат</label><strong>морская</strong></div></div><div class="controls"><button class="ctrl active">Просто рядом<small>тихо дышит и живёт рядом</small></button><button class="ctrl">Гладить<small>довольно оживает</small></button><button class="ctrl">Покормить<small>рядом миска и домик</small></button><button class="ctrl">Домик<small>отдых без тревоги</small></button></div><div class="wm">@parchaipodusham</div></div><script>const w=document.getElementById('petWrap');document.getElementById('petHitbox').onpointerdown=()=>{w.classList.remove('wiggle');void w.offsetWidth;w.classList.add('wiggle');setTimeout(()=>w.classList.remove('wiggle'),340);};</script></body></html>
