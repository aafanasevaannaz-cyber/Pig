<!doctype html>
<html lang="ru">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Свинка-дружок</title>
<style>
:root{
  --bg1:#fff7b8; --bg2:#ffe7a6; --bg3:#f3d98f;
  --card:rgba(255,255,255,.58); --line:rgba(255,255,255,.64);
  --ink:#302722; --muted:#79665c; --shadow:0 24px 60px rgba(79,58,43,.14);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0; font-family:Inter,system-ui,-apple-system,sans-serif; color:var(--ink);
  background:radial-gradient(1200px 760px at 50% -10%,rgba(255,255,255,.62),transparent 60%),linear-gradient(180deg,var(--bg1),var(--bg2) 52%,var(--bg3));
}
.app{min-height:100vh;max-width:460px;margin:0 auto;padding:18px 14px calc(82px + env(safe-area-inset-bottom,0px));display:grid;grid-template-rows:auto auto 1fr auto auto;gap:12px}
.card{backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:24px}
.top{padding:14px 16px;display:flex;justify-content:space-between;gap:10px;align-items:center}
h1{margin:0;font-size:20px;line-height:1.05} p{margin:4px 0 0;color:var(--muted);font-size:12px}
.pill{border-radius:999px;background:rgba(255,255,255,.82);padding:10px 14px;color:var(--muted);font-size:12px}
.scene{position:relative;min-height:560px;border-radius:34px;overflow:hidden;background:linear-gradient(180deg,#fff7b8,#ffe7a6 48%,#f3d98f)}
.scene.feed{background:linear-gradient(180deg,#fff7b8,#eef4af 48%,#dce39e)}
.scene.house{background:linear-gradient(180deg,#fff0b5,#f5dda6 48%,#e6c587)}
.scene.sleep{background:linear-gradient(180deg,#f0f2cf,#d7dde6 48%,#b9c4d9)}
.scene.play{background:linear-gradient(180deg,#fff4ba,#ffe7a6 48%,#f3d98f)}
.glow{position:absolute;inset:0;background:radial-gradient(340px 200px at 50% 18%,rgba(255,255,255,.55),transparent 70%)}
.bubble{position:absolute;top:18px;left:50%;transform:translateX(-50%);padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.86);box-shadow:0 8px 24px rgba(0,0,0,.08);font-size:13px;z-index:7}
.ground{position:absolute;left:22px;right:22px;bottom:16px;height:116px;border-radius:999px;background:rgba(255,248,210,.42)}
.house{position:absolute;left:26px;bottom:40px;width:132px;height:96px;border-radius:38px 38px 22px 22px;background:#d4b27a;box-shadow:0 18px 28px rgba(96,64,24,.12);opacity:.16;transition:.35s}
.scene.house .house,.scene.sleep .house{opacity:.95}
.house:after{content:'';position:absolute;left:36px;top:36px;width:58px;height:48px;border-radius:26px 26px 20px 20px;background:rgba(94,58,29,.45)}
.hay{position:absolute;right:28px;bottom:52px;width:86px;height:42px;border-radius:24px 24px 18px 18px;background:repeating-linear-gradient(100deg,#dfc474 0 5px,#edd58b 5px 10px,#e1c879 10px 15px);opacity:.92}
.bowl{position:absolute;left:44px;bottom:48px;width:88px;height:38px;border-radius:0 0 30px 30px;background:linear-gradient(180deg,#cfddc2,#9fb188)}
.bowl:before{content:'';position:absolute;left:-2px;right:-2px;top:-10px;height:16px;border-radius:999px;background:linear-gradient(180deg,#f9fcf6,#d7e4c7)}
.veg{position:absolute;left:72px;bottom:78px;width:24px;height:16px;background:#7fb867;border-radius:16px 16px 2px 16px;transform:rotate(-18deg);box-shadow:12px -2px 0 #9bd27f}
.pet-wrap{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);width:min(92%,360px);z-index:5;transition:transform .35s ease,opacity .35s ease,filter .35s ease}
.scene.feed .pet-wrap{transform:translateX(calc(-50% - 14px))}
.scene.house .pet-wrap{transform:translateX(calc(-50% - 34px)) scale(.92);opacity:.18}
.scene.sleep .pet-wrap{transform:translateX(-50%) translateY(10px) scale(.99);filter:saturate(.84)}
.scene.play .pet-wrap{transform:translateX(calc(-50% + 6px)) translateY(-8px) scale(1.03)}
.scene.pet .pet-wrap{transform:translateX(-50%) scale(1.025)}
.pet-shadow{position:absolute;left:18%;right:18%;bottom:8px;height:24px;border-radius:999px;background:rgba(122,90,49,.16);filter:blur(8px);animation:shadowBreath 3.2s ease-in-out infinite}
.pet{display:block;width:100%;height:auto;filter:drop-shadow(0 16px 20px rgba(70,52,38,.14));transform-origin:50% 82%;animation:breathe 3.2s ease-in-out infinite,sway 6.2s ease-in-out infinite}
.scene.pet .pet{animation:breathePet 1s ease-in-out infinite,sway 5.2s ease-in-out infinite}
.scene.sleep .pet{animation:sleepBreathe 5.1s ease-in-out infinite}
.scene.play .pet{animation:breathe 2.7s ease-in-out infinite,sway 4.5s ease-in-out infinite}
.pet-wrap.wiggle{animation:petWiggle .34s ease-in-out}
.pet-wrap.jump{animation:jump .72s ease}
.touch{position:absolute;inset:0;border:none;background:transparent;z-index:8}
.burst{position:absolute;inset:0;pointer-events:none;z-index:9}
.heart{position:absolute;font-size:18px;opacity:0;animation:burst2 1.15s ease forwards}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.metric{padding:12px;border-radius:22px}
.metric label{display:block;font-size:11px;color:var(--muted)} .metric strong{display:block;margin-top:4px;font-size:14px}
.controls{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.ctrl{border:none;border-radius:20px;padding:14px 12px;text-align:left;background:rgba(255,255,255,.68);font:inherit;color:var(--ink);min-height:70px}
.ctrl small{display:block;margin-top:4px;font-size:11px;color:var(--muted)} .ctrl.active{background:rgba(203,141,105,.22)}
.wm{position:fixed;right:16px;bottom:12px;font-size:11px;letter-spacing:.08em;color:rgba(47,39,34,.38);pointer-events:none}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-2px) scale(1.016)}}
@keyframes breathePet{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-1px) scale(1.024)}}
@keyframes sleepBreathe{0%,100%{transform:translateY(6px) scale(.99)}50%{transform:translateY(3px) scale(.997)}}
@keyframes sway{0%,100%{rotate:-1deg}50%{rotate:1deg}}
@keyframes petWiggle{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}50%{transform:translateX(3px)}75%{transform:translateX(-2px)}}
@keyframes jump{0%,100%{transform:translateX(-50%) translateY(0)}35%{transform:translateX(-50%) translateY(-12px)}60%{transform:translateX(-50%) translateY(-4px)}}
@keyframes shadowBreath{0%,100%{transform:scaleX(1)}50%{transform:scaleX(1.04)}}
@keyframes burst2{0%{opacity:0;transform:translate(0,0) scale(.55)}20%{opacity:1}100%{opacity:0;transform:translate(var(--x),var(--y)) scale(1.2)}}
@media (max-width:390px){.stats{grid-template-columns:repeat(2,1fr)}.scene{min-height:500px}.pet-wrap{width:min(94%,300px)}}
</style>
<body>
<div class="app">
  <div class="card top">
    <div><h1>Свинка-дружок</h1><p>мой типо тамагочи уже тут</p></div>
    <div class="pill" id="modePill">Спокойная и сытая</div>
  </div>
  <div class="scene card relax" id="scene">
    <div class="glow"></div>
    <div class="bubble" id="bubble">я рядом</div>
    <div class="house"></div><div class="hay"></div><div class="bowl"></div><div class="veg"></div><div class="ground"></div><div class="burst" id="burst"></div>
    <div class="pet-wrap" id="petWrap"><div class="pet-shadow"></div><img class="pet" alt="Свинка" src="data:image/webp;base64,UklGRrKjAABXRUJQVlA4IKajAAAwTQCdASqAA2gCPm02mUekIyIhKAgAsBIJaQAcA4CcJbACdAEO+Acw8M9Pb+Y0/y/r+N9vV3ef+vzhdRNpVvZwfYrT9v5h+vj56++x4+N8P4HZT0r8z0iKx/8v7dT/yv9ePZLqz+gQqrY50s5b0eL/lXldxnw9WkK54Mq3gPln3Q+W7jcvgj/zwkR/9q8t+J5S8OPv4Q1b9ud54+9e6z5+8g1J9F9o8l7M28fQx1L2Hn2rXn4b2P1E6V7V9kB6M4iJj5H1W1m2o6c2A1b2a9nK2N1E2K1C3rjF1w6Y6T6+8nWgE2mD9dT6P3vM8rV5rJ8f9j7Q7T4P0S9nQ4U3N3s8t3K5d0w+0V5qG2F6X+W3Q4Q8V4bP4e7wF3x5+1K7sVv4M2T8Lr4nL+v2E7v5i3l6i5Y9w9p4m8t7V8y6m1cQ+d6M2d8j4I9o7a+o8Z7U8d8C8y+J8d7yJ7M7Q7w8t5M8k6m7Q8m7S8t7K7v7R8s7a8f7v7M8t6J7W7U6J8s6m7H8P7S7m7f7H7L8Z8u7z7m8v8M7A7w7L7J7S7d7C8Z7m7b8n7Z8H7T7X8P7j7O8C7o8H8f8P7X8f8O7S8R8m7s7V8p8b7v7N8X8Q8s8N8R7v8S8r8X8V8i8Y8w8c8b8d8f8g8h8j8l8m8n8p8q8r8s8t8u8v8w8x8y8z8z8y8x8w8v8u8t8s8r8q8p8o8n8m8l8k8j8i8h8g8f8e8d8c8b8a8Z8Y8X8W8V8U8T8S8R8Q8P8O8N8M8L8K8J8I8H8G8F8E8D8C8B8A8A8B8C8D8E8F8G8H8I8J8K8L8M8N8O8P8Q8R8S8T8U8V8W8X8Y8Z8a8b8c8d8e8f8g8h8i8j8k8l8m8n8o8p8q8r8s8t8u8v8w8x8y8z8wEAAP7/3v8AA/vuUAAA"></div>
    <button class="touch" id="touch" aria-label="Погладить свинку"></button>
  </div>
  <div class="stats">
    <div class="card metric"><label>сытость</label><strong id="hungerLabel">сытая</strong></div>
    <div class="card metric"><label>настроение</label><strong id="moodLabel">спокойная</strong></div>
    <div class="card metric"><label>формат</label><strong>тамагочи</strong></div>
  </div>
  <div class="controls" id="controls">
    <button class="ctrl active" data-mode="relax">Просто рядом<small>дышит и качается</small></button>
    <button class="ctrl" data-mode="pet">Гладить<small>дрожит от удовольствия</small></button>
    <button class="ctrl" data-mode="feed">Покормить<small>тянется к миске</small></button>
    <button class="ctrl" data-mode="house">Домик<small>уходит отдыхать</small></button>
    <button class="ctrl" data-mode="sleep">Сон<small>медленное дыхание</small></button>
    <button class="ctrl" data-mode="play">Милая радость<small>лёгкий подпрыг</small></button>
  </div>
  <div class="wm">@parchaipodusham</div>
</div>
<script>
const els={scene:document.getElementById('scene'),bubble:document.getElementById('bubble'),modePill:document.getElementById('modePill'),moodLabel:document.getElementById('moodLabel'),hungerLabel:document.getElementById('hungerLabel'),controls:[...document.querySelectorAll('#controls .ctrl')],touch:document.getElementById('touch'),burst:document.getElementById('burst'),petWrap:document.getElementById('petWrap')};
const modes={relax:{bubble:'я рядом',mood:'спокойная',hunger:'сытая',pill:'Спокойная и сытая'},pet:{bubble:'нравится поглаживание',mood:'довольная',hunger:'сытая',pill:'Гладишь — ей хорошо'},feed:{bubble:'радуется еде',mood:'радуется',hunger:'очень сытая',pill:'Покормили — довольна'},house:{bubble:'спряталась в домик',mood:'в домике',hunger:'сытая',pill:'Домик и отдых'},sleep:{bubble:'тихо засыпает',mood:'сонная',hunger:'сытая',pill:'Сонный режим'},play:{bubble:'маленькая радость',mood:'весёлая',hunger:'чуть голодная',pill:'Милая радость'}};
function hearts(char='❤'){els.burst.innerHTML='';[[24,-26],[-18,-34],[-42,-14],[42,-16]].forEach(([x,y],i)=>{const s=document.createElement('span');s.className='heart';s.textContent=char;s.style.left='50%';s.style.top='54%';s.style.setProperty('--x',x+'px');s.style.setProperty('--y',y+'px');s.style.animationDelay=(i*60)+'ms';els.burst.appendChild(s);});}
function wiggle(){if(els.scene.classList.contains('sleep')) return;els.petWrap.classList.remove('wiggle');void els.petWrap.offsetWidth;els.petWrap.classList.add('wiggle');setTimeout(()=>els.petWrap.classList.remove('wiggle'),340);}
function bounce(){els.petWrap.classList.remove('jump');void els.petWrap.offsetWidth;els.petWrap.classList.add('jump');setTimeout(()=>els.petWrap.classList.remove('jump'),720);}
function setMode(mode){els.scene.className='scene card '+mode;const d=modes[mode];els.bubble.textContent=d.bubble;els.modePill.textContent=d.pill;els.moodLabel.textContent=d.mood;els.hungerLabel.textContent=d.hunger;els.controls.forEach(btn=>btn.classList.toggle('active',btn.dataset.mode===mode));if(mode==='pet'){hearts('❤');wiggle();}if(mode==='feed'){hearts('✦');setTimeout(wiggle,120);}if(mode==='play'){hearts('✦');bounce();}if(mode==='relax'||mode==='house'||mode==='sleep') els.burst.innerHTML='';}
els.controls.forEach(btn=>btn.addEventListener('click',()=>setMode(btn.dataset.mode)));
els.touch.addEventListener('pointerdown',()=>setMode('pet'));
['pointerup','pointerleave','pointercancel'].forEach(ev=>els.touch.addEventListener(ev,()=>setTimeout(()=>setMode('relax'),700)));
setMode('relax');
setInterval(()=>{if(!els.scene.classList.contains('sleep')&&!els.scene.classList.contains('house')) wiggle();},5200);
</script>
